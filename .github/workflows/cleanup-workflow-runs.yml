name: 清理工作流历史记录

on:
  # 每周一凌晨 3 点（UTC）自动执行
  schedule:
    - cron: '0 3 * * 1'
  # 支持手动触发
  workflow_dispatch:

# 同一时间只允许一个实例运行
concurrency:
  group: cleanup-workflow-runs
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read

    steps:
      - name: 清理历史工作流运行记录
        uses: actions/github-script@v7
        with:
          script: |
            const KEEP = 5; // 每个 workflow 保留最近运行次数
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = context.runId; // 当前运行 id，删除时跳过避免删到正在执行的自己

            core.info(`开始清理 ${owner}/${repo} 的工作流历史，每个 workflow 保留最近 ${KEEP} 次（当前 run ${currentRunId} 不会被删除）`);

            // 1. 获取所有 workflows
            const workflows = await github.paginate(
              github.rest.actions.listRepoWorkflows,
              { owner, repo, per_page: 100 }
            );
            core.info(`共发现 ${workflows.length} 个 workflow`);

            let totalDeleted = 0;

            // 2. 逐个 workflow 处理
            for (const wf of workflows) {
              // 获取该 workflow 全部运行记录（按创建时间倒序）
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                { owner, repo, workflow_id: wf.id, per_page: 100 }
              );

              if (runs.length <= KEEP) {
                core.info(`[${wf.name}] 仅 ${runs.length} 条，无需清理`);
                continue;
              }

              // 删除多余的（runs 已按时间倒序，跳过前 KEEP 条）
              // 同时跳过当前正在运行的 run，避免删到执行中的自己
              const toDelete = runs.slice(KEEP).filter(r => r.id !== currentRunId);
              core.info(`[${wf.name}] 共 ${runs.length} 条，删除 ${toDelete.length} 条`);

              let deleted = 0;
              for (const run of toDelete) {
                try {
                  await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                  deleted++;
                } catch (err) {
                  // 个别删除失败不中断整体流程
                  core.warning(`[${wf.name}] 删除 run ${run.id} 失败: ${err.message}`);
                }
              }

              core.info(`[${wf.name}] 实际删除 ${deleted}/${toDelete.length}`);
              totalDeleted += deleted;
            }

            core.info(`清理完成，共删除 ${totalDeleted} 条历史记录`);
