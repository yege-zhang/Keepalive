name: IAMHC AI 每日签到

on:
  schedule:
    - cron: "0 2 * * *" # 每天 UTC 02:00 = 北京时间 10:00
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 安装依赖
        working-directory: ./iamhc
        run: pip install -r requirements.txt

      - name: ✅ 执行签到
        id: checkin
        working-directory: ./iamhc
        env:
          IAMHC_BASE_URL: ${{ vars.IAMHC_BASE_URL }}
          IAMHC_USER_ID: ${{ vars.IAMHC_USER_ID }}
          IAMHC_USERNAME: ${{ vars.IAMHC_USERNAME }}
          IAMHC_PASSWORD: ${{ vars.IAMHC_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          IAMHC_SESSION_COOKIE: ${{ vars.IAMHC_SESSION_COOKIE }}
        run: python checkin.py

      - name: 💾 将 session 写回 GitHub Actions Variables
        if: always()
        working-directory: ./iamhc
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f session.cookie.b64 ]; then
            SESSION_VALUE=$(cat session.cookie.b64)
            echo "写入 session 到 IAMHC_SESSION_COOKIE 变量..."
            gh variable set IAMHC_SESSION_COOKIE \
              --body "$SESSION_VALUE" \
              --repo ${{ github.repository }}
            echo "✅ 写入成功"
            rm -f session.cookie.b64
          else
            echo "⏭️ 无 session.b64 文件，跳过写入"
          fi
